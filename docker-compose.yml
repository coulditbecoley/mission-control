version: '3.8'

services:
  mission-control:
    image: ghcr.io/coulditbecoley/mission-control:latest
    container_name: mission-control
    ports:
      - "3001:3000"
    environment:
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-http://host.docker.internal:8787}
      OPENCLAW_TOKEN: ${OPENCLAW_TOKEN}
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: mission-control-network
